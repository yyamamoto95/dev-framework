name: サイクルタイム計測

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read

jobs:
  record-sprint-start:
    name: スプリント開始を記録
    if: github.event_name == 'issues' && github.event.label.name == 'in-progress'
    runs-on: ubuntu-latest
    steps:
      - name: 開始タイムスタンプをコメント投稿
        uses: actions/github-script@v8
        with:
          script: |
            const now = new Date();
            const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
            // 「YYYY-MM-DD HH:MM JST」形式（パース側の正規表現と一致させること）
            const timestamp = jst.toISOString().slice(0, 16).replace('T', ' ') + ' JST';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## スプリント開始',
                '',
                `| 項目 | 値 |`,
                `|------|---|`,
                `| 開始日時 | ${timestamp} |`,
                `| スプリント識別子 | ${timestamp.slice(0, 10)} / Issue #${context.issue.number} |`,
                '',
                '> サイクルタイム計測を開始しました。PR マージ時に自動集計されます。',
              ].join('\n'),
            });

  record-sprint-complete:
    name: サイクルタイムを集計
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: サイクルタイムを集計し Issue にコメント + Project フィールドを更新
        uses: actions/github-script@v8
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          CYCLE_TIME_FIELD_ID: ${{ vars.PROJECT_CYCLE_TIME_FIELD_ID }}
          SPRINT_FIELD_ID: ${{ vars.PROJECT_SPRINT_FIELD_ID }}
          SP_FIELD_ID: ${{ vars.PROJECT_SP_FIELD_ID }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prBody = pr.body || '';
            const prTitle = pr.title;
            const mergedAt = new Date(pr.merged_at);
            const changedFiles = pr.changed_files ?? '不明';
            const additions = pr.additions ?? 0;
            const deletions = pr.deletions ?? 0;

            const PROJECT_ID = process.env.PROJECT_ID;
            const CYCLE_TIME_FIELD_ID = process.env.CYCLE_TIME_FIELD_ID;
            const SPRINT_FIELD_ID = process.env.SPRINT_FIELD_ID;
            const SP_FIELD_ID = process.env.SP_FIELD_ID;
            const POINT_SCALE = { XS: 1, S: 2, M: 3, L: 5, XL: 8 };

            const issueNumbers = [];
            const closesPattern = /Closes\s+#(\d+)/gi;
            let m;
            while ((m = closesPattern.exec(prBody)) !== null) {
              issueNumbers.push(parseInt(m[1], 10));
            }
            if (issueNumbers.length === 0) {
              console.log('Closes #番号 が PR 本文に見つかりませんでした。スキップします。');
              return;
            }

            const sprintMatch = prBody.match(/Sprint:\s*(\d+)/i);
            const sprintNumber = sprintMatch ? parseInt(sprintMatch[1], 10) : null;

            async function findProjectItemId(issueNumber) {
              let cursor = null;
              while (true) {
                const res = await github.graphql(`
                  query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes { id content { ... on Issue { number } } }
                        }
                      }
                    }
                  }`, { projectId: PROJECT_ID, cursor });
                const { items } = res.node;
                const found = items.nodes.find(n => n.content?.number === issueNumber);
                if (found) return found.id;
                if (!items.pageInfo.hasNextPage) break;
                cursor = items.pageInfo.endCursor;
              }
              return null;
            }

            async function updateNumberField(itemId, fieldId, value) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value
                  }) { projectV2Item { id } }
                }`, { projectId: PROJECT_ID, itemId, fieldId, value: { number: value } });
            }

            for (const issueNumber of issueNumbers) {
              let issue;
              try {
                const { data } = await github.rest.issues.get({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
                });
                issue = data;
              } catch (e) {
                console.log(`Issue #${issueNumber} の取得に失敗: ${e.message}`);
                continue;
              }

              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, per_page: 100,
              });

              const startComment = comments.data.find(c =>
                c.body.includes('スプリント開始') && c.body.includes('開始日時')
              );

              let cycleTimeText = '計測データなし（in-progress ラベル付与前にマージされた可能性があります）';
              let cycleTimeHours = null;
              let startedAt = null;

              if (startComment) {
                // 「開始日時」行から日時を抽出（旧形式「HH:MM:SS.cc」・新形式「HH:MM JST」の両方を許容）
                const dateMatch = startComment.body.match(/開始日時[^\d]*(\d{4}-\d{2}-\d{2} \d{2}:\d{2})/);
                if (dateMatch) {
                  startedAt = new Date(dateMatch[1].replace(' ', 'T') + ':00+09:00');
                }
              }

              if (!startedAt) {
                // フォールバック: in-progress ラベル付与イベントの時刻を開始時刻とする
                const events = await github.paginate(github.rest.issues.listEvents, {
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issueNumber, per_page: 100,
                });
                const labeled = events.find(e => e.event === 'labeled' && e.label?.name === 'in-progress');
                if (labeled) {
                  startedAt = new Date(labeled.created_at);
                }
              }

              if (startedAt) {
                const diffMs = mergedAt - startedAt;
                cycleTimeHours = Math.round((diffMs / (1000 * 60 * 60)) * 10) / 10;
                const diffH = Math.floor(diffMs / (1000 * 60 * 60));
                const diffM = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                cycleTimeText = `${diffH}時間 ${diffM}分`;
              }

              const mergedAtJst = new Date(mergedAt.getTime() + 9 * 60 * 60 * 1000)
                .toISOString().replace('T', ' ').replace('Z', ' JST').slice(0, 22);

              const commentBody = [
                '## スプリント完了 — サイクルタイムレポート',
                '',
                `| 項目 | 値 |`,
                `|------|---|`,
                `| 完了 PR | [#${pr.number} ${prTitle}](${pr.html_url}) |`,
                `| 完了日時 | ${mergedAtJst} |`,
                `| サイクルタイム | ${cycleTimeText} |`,
                `| 変更ファイル数 | ${changedFiles} |`,
                `| 追加 / 削除行 | +${additions} / -${deletions} |`,
                '',
                '---',
                '',
                '### 次のステップ',
                '',
                '- `スプリントレビューをして` を実行してレトロスペクティブを記録する',
                '- 次の PBI を `sprint-backlog` から選択してスプリントを継続する',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, body: commentBody,
              });

              const itemId = await findProjectItemId(issueNumber);
              if (itemId) {
                if (cycleTimeHours !== null) {
                  await updateNumberField(itemId, CYCLE_TIME_FIELD_ID, cycleTimeHours);
                  console.log(`#${issueNumber}: Cycle Time (h) = ${cycleTimeHours}`);
                }
                if (sprintNumber !== null) {
                  await updateNumberField(itemId, SPRINT_FIELD_ID, sprintNumber);
                  console.log(`#${issueNumber}: Sprint # = ${sprintNumber}`);
                }
                const sizeLabel = issue.labels.find(l => l.name.startsWith('size: '));
                if (sizeLabel) {
                  const sizeKey = sizeLabel.name.replace('size: ', '');
                  const points = POINT_SCALE[sizeKey];
                  if (points) {
                    await updateNumberField(itemId, SP_FIELD_ID, points);
                    console.log(`#${issueNumber}: Story Points = ${points}`);
                  }
                }
              } else {
                console.log(`#${issueNumber}: Project アイテムが見つかりませんでした`);
              }
              console.log(`Issue #${issueNumber} にサイクルタイムレポートを投稿しました`);
            }
